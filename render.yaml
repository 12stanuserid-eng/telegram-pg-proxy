# Render Blueprint Config
# Deploy with: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: telegram-pg-proxy
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: PGHOST
        value: "0.0.0.0"
    healthCheckPath: /healthz
    plan: free
